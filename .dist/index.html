<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <h1>💧 Water Tracker</h1>

<input type="number" id="goal" placeholder="Set goal (ml)">
<button onclick="setGoal()">Set Goal</button>

   <!-- Goal Input -->
    <div class="goal-section">
      <input type="number" id="goalInput" placeholder="Enter goal (ml)">
      <button id="setGoalBtn">Set Goal</button>
    </div>
    
    <!-- Progress Bar -->
    <div class="progress-bar">
      <div id="progress"></div>
    </div>

    <!-- Status -->
    <p id="status">0ml / 0ml</p>

    <!-- Quick Add Buttons -->
    <div class="buttons">
      <button id="add250">+250ml</button>
      <button id="add500">+500ml</button>
    </div>

</body>    
</html>
