<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>
<body>

    <div class="container">
        <h1>💧 Water Tracker</h1>

        <!-- Goal Input -->
        <div class="goal-section">
            <input type="number" id="goalInput" placeholder="Enter goal (ml)">
            <button id="setGoalBtn">Set Goal</button>
        </div>
    
    <!-- Progress Circle -->
        <div class="progress-box">
            <div class="progress-circle">
                <span id="progressText">0%</span>
            </div>
        </div>


    <!-- Status -->
    <p id="status">0ml / 0ml</p>

    <!-- Quick Add Buttons -->
    <div class="buttons">
      <button id="add250">+250ml</button>
      <button id="add500">+500ml</button>
    </div>

   <!-- Message -->
        <p id="message">Stay hydrated 💙</p>

        <!-- Reset -->
        <button class="reset" id="resetBtn">Reset</button>
    </div>

</body>    
</html>
